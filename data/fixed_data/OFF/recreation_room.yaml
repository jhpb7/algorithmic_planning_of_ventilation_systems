units:
  area: m^2
  length: m
  width: m
  height: m
  bending_radius: \?
  # volume_flow_ratio is defined as: volume_flow_straight / volume_flow_in
  volume_flow_ratio: \-


system:
  width: 0.2
  height: 0.2
  elements:
    1:
      name: reheater
      zeta: 8
    2:
      name: rect_branch
      width: 0.2
      height: 0.2
      direction: straight
      volume_flow_ratio: 0.5
    3:
      name: duct
      length: 1.5
    4:
      name: rect_bending
      bending_radius: 0.45
      bending_angle: 90
      n_bendings: 1
    5:
      name: air_diffuser
      comment: tellerventil, für flaechenberechnung so getan als sei es eckig
      diffuser_type: quadratischer Vierwegedurchlass
      zeta: 10
      width: 0.14
      height: 0.14
      outlet_location: im Raum
